tasks:
  strategy: sequential # this is the default strategy for executing tasks, it means that the tasks will be executed one after another in the order they are defined
  max_retries: 3
  start: # this is the initial task that will be executed when the workflow starts, will always run first
    parallel: true
    description: Initializing Step
    steps:
      - git:
          description: Set up Git if not already set up # This is just a description.
          script: # main script run here
          on_failure: # script to run when fail so we can set up git if it is not already set up, this is important for the repository step to work
          dependencies: [] # this is important to set up the dependencies for the next steps, if git is not set up, the repository step will fail, so we need to make sure that git is set up before we run the repository step
      - repository:
          description: Install github repository for Medifab
          script:
      - docker:
          description: Check if Docker is installed, if not install it
          script:
      - node:
          description: Check if Node.js is installed, if not install it
          script:
      - dotnet:
          description: Check if .NET is installed, if not install it
          script:
  setup: # this is steps where the actual installation is done, this is running the script inside the codebase to install the necessary dependencies and build the project
    parallel: false
    description: Setup Step
    steps:
      - npm:
          description: Run the installation script for Medifab
          script: npm install
      - dotnet:
          description: Run the installation script for Medifab
          script: dotnet restore
      - docker:
          description: Build the Docker images for Medifab
          script: docker build -t medifab .
          dependencies: [npm, dotnet]
      - compose:
          description: Run the Docker Compose for Medifab
          script: docker-compose up -d
          dependencies: [docker]
  post:
    parallel: true
    description: Post Installation Step
    steps:
      - healthcheck:
          description: Check if the Medifab services are running properly
          script: curl -f http://localhost:3000/health || exit 1
          dependencies: [compose]
